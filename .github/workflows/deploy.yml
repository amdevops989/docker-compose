name: "Strict Monorepo Service Isolation Pipeline"

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'

jobs:
  # ==========================================
  # STAGE 1: ANALYZE GIT DIFF CHANGES
  # ==========================================
  changes_detector:
    name: "Detect Modified Services"
    runs-on: ubuntu-latest
    # Map the plugin outputs to global job outputs so other jobs can read them
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v4

      - name: "Execute Path Analysis Matcher"
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ==========================================
  # STAGE 2: ISOLATED SERVICE BUILDS
  # ==========================================
  build_backend:
    name: "Backend Core Module"
    runs-on: ubuntu-latest
    needs: changes_detector
    # STRICT GUARD: This job will only start if the detector confirms backend changes are TRUE
    if: needs.changes_detector.outputs.backend == 'true'
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v4

      - name: "Authenticate to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build & Push Backend Layer"
        run: |
          docker build -t "${{ secrets.DOCKERHUB_USERNAME }}/crud-backend:latest" ./backend
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/crud-backend:latest"

  build_frontend:
    name: "Frontend UI Module"
    runs-on: ubuntu-latest
    needs: changes_detector
    # STRICT GUARD: This job will only start if the detector confirms frontend changes are TRUE
    if: needs.changes_detector.outputs.frontend == 'true'
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v4

      - name: "Authenticate to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build & Push Frontend Layer"
        run: |
          docker build -t "${{ secrets.DOCKERHUB_USERNAME }}/crud-frontend:latest" ./frontend
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/crud-frontend:latest"

