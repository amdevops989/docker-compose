---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: istio-pods
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      security.istio.io/tlsMode: istio
      # app: nginx
  podMetricsEndpoints:
    - port: http-envoy-prom
      path: stats/prometheus