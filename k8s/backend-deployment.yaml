apiVersion: apps/v1
kind: Deployment
metadata:
  name: crud-backend-deployment
  labels:
    app: crud-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crud-backend
  template:
    metadata:
      labels:
        app: crud-backend
    spec:
      containers:
        - name: backend-api
          image: devopsflow999/crud-backend:latest 
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_USER
              value: "devopsadmin"
            - name: DB_PASSWORD
              value: "secretpassword"
            - name: DB_NAME
              value: "app_production"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: crud-backend # Matches the ServiceMonitor selector.spec.selector.matchLabels
spec:
  selector:
    app: crud-backend # Matches the template.metadata.labels of your pods
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      name: http-web # Matches the ServiceMonitor selector.spec.endpoints[0].port
  type: ClusterIP