<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Inventory Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md bg-gray-800 rounded-xl shadow-2xl border border-gray-700 p-6 space-y-6">
        
        <div class="border-b border-gray-700 pb-4">
            <h1 class="text-2xl font-bold tracking-wide text-indigo-400">Inventory Tracker</h1>
            <p class="text-xs text-gray-400 mt-1">  Multi-container DevOps CRUD Engine</p>
        </div>

        <div class="flex gap-2">
            <input type="text" id="itemName" 
                   class="flex-1 bg-gray-900 border border-gray-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-indigo-500 transition-colors placeholder-gray-500" 
                   placeholder="Enter asset or item name...">
            <button onclick="addItem()" 
                    class="bg-indigo-600 hover:bg-indigo-500 text-white font-medium text-sm px-4 py-2 rounded-lg transition-colors active:scale-95 transform">
                Add
            </button>
        </div>

        <div>
            <h2 class="text-sm font-semibold text-gray-400 mb-3 tracking-wider uppercase">Active Cluster Storage</h2>
            <ul id="itemsList" class="space-y-2 max-h-64 overflow-y-auto pr-1">
                </ul>
        </div>
    </div>

    <script>
        //const API_URL = 'http://localhost:3000/items';
        // AFTER (Unified Ingress Path): //
        const API_URL = '/api/items';

        // Fetch and Render Items 
        async function fetchItems() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const list = document.getElementById('itemsList');
                
                if (data.length === 0) {
                    list.innerHTML = `<li class="text-sm text-gray-500 italic text-center py-4">No items inside storage.</li>`;
                    return;
                }

                list.innerHTML = data.map(item => `
                    <li class="flex items-center justify-between bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 group hover:border-gray-600 transition-colors">
                        <div class="flex items-center space-x-3">
                            <span class="text-xs font-mono text-indigo-400 bg-indigo-950 px-2 py-0.5 rounded border border-indigo-900">#${item.id}</span>
                            <span class="text-sm font-medium text-gray-200">${item.name}</span>
                        </div>
                        <button onclick="deleteItem(${item.id})" 
                                class="text-gray-500 hover:text-red-400 p-1 rounded hover:bg-gray-800 transition-colors"
                                title="Delete Item">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </li>
                `).join('');
            } catch (err) {
                console.error("Failed fetching records:", err);
            }
        }

        // Add Item Action
        async function addItem() {
            const input = document.getElementById('itemName');
            const name = input.value.trim();
            if (!name) return;

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            input.value = '';
            fetchItems();
        }

        // Delete Item Action
        async function deleteItem(id) {
            await fetch(`${API_URL}/${id}`, {
                method: 'DELETE'
            });
            fetchItems();
        }

        // Initial 
        fetchItems();
    </script>
</body>
</html>
