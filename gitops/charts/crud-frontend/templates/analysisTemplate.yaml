apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ .Release.Name }}-success-rate
  namespace: {{ .Release.Namespace | default "production" }}
spec:
  metrics:
    # --------------------------------------------------------
    # METRIC 1: HTTP Error Rate Check (Must be under 1%)
    # --------------------------------------------------------
    - name: http-error-rate
      interval: 30s
      count: 3 # FIXED: Runs 3 times over 90 seconds, then finishes successfully if clean
      successCondition: result[0] < 0.01
      failureLimit: 1 
      provider:
        prometheus:
          address: {{ .Values.prometheus.address | default "http://prometheus-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090" }}
          query: |
            sum(rate(istio_requests_total{reporter="destination",destination_service="~{{ .Release.Name }}-canary.*",response_code=~"5.*"}[1m]))
            /
            sum(rate(istio_requests_total{reporter="destination",destination_service="~{{ .Release.Name }}-canary.*"}[1m]))

    # --------------------------------------------------------
    # METRIC 2: HTTP Latency Check (P95 must be under 200ms)
    # --------------------------------------------------------
    - name: http-latency
      interval: 30s
      count: 3 # FIXED: Runs 3 times over 90 seconds alongside the error check
      successCondition: result[0] < 0.200
      failureLimit: 2 
      provider:
        prometheus:
          address: {{ .Values.prometheus.address | default "http://prometheus-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090" }}
          query: |
            histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{reporter="destination",destination_service="~{{ .Release.Name }}-canary.*"}[2m])) by (le)) / 1000