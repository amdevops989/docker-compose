apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ .Release.Name }}-success-rate
  namespace: {{ .Release.Namespace | default "production" }}
spec:
  metrics:
    # --------------------------------------------------------
    # METRIC 1: Frontend Canary Error Rate (Must be under 1%)
    # --------------------------------------------------------
    - name: http-error-rate
      interval: 30s
      count: 3
      successCondition: result[0] < 0.01
      failureLimit: 1 
      provider:
        prometheus:
          address: {{ .Values.prometheus.address | default "http://prometheus-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090" }}
          query: |
            (
              sum(rate(istio_requests_total{reporter="source",destination_service_name="{{ .Release.Name }}-canary",response_code=~"5.*"}[1m]))
              /
              sum(rate(istio_requests_total{reporter="source",destination_service_name="{{ .Release.Name }}-canary"}[1m]))
            ) or vector(0)

    # --------------------------------------------------------
    # METRIC 2: Frontend Canary Latency Check (P95 under 200ms)
    # --------------------------------------------------------
    - name: http-latency
      interval: 30s
      count: 3
      successCondition: result[0] < 0.200
      failureLimit: 2 
      provider:
        prometheus:
          address: {{ .Values.prometheus.address | default "http://prometheus-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090" }}
          query: |
            (
              histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{reporter="source",destination_service_name="{{ .Release.Name }}-canary"}[2m])) by (le)) / 1000
            ) or vector(0.05)