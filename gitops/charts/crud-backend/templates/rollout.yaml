# ==========================================================
# DATABASE INFRASTRUCTURE CONFIGURATION CONFIGMAP & SECRET
# ==========================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-backend-config
  annotations:
    # Forces Argo CD to ignore server-side generation disparities
    argocd.argoproj.io/compare-options: IgnoreExtraneous
spec:
  data:
    POSTGRES_USER: "devopsadmin"
    POSTGRES_DB: "app_production"
    DB_HOST: "database-engine"
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-backend-secret
type: Opaque
stringData:
  # Kubernetes automatically base64 encodes values placed in stringData
  POSTGRES_PASSWORD: "secretpassword"

---
# ==========================================================
# 1. backend APP ARCHITECTURE (Canary Rollout + Services)
# ==========================================================
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app: {{ .Release.Name }}-backend
spec:
  replicas: {{ .Values.replicaCount | default 3 }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-backend
    spec:
      containers:
        - name: backend-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
  strategy:
    {{- if eq .Values.strategyType "Canary" }}
    canary:
      stableService: {{ .Release.Name }}-stable
      canaryService: {{ .Release.Name }}-canary
      trafficRouting:
        istio:
          virtualService:
            name: {{ .Release.Name }}-vservice
            routes:
              - backend-route
      steps:
        - setWeight: 20
        - pause: { duration: 3m }
        - setWeight: 50
        - pause: { duration: 2m }
    {{- else }}
    rollingUpdate: {} 
    {{- end }}