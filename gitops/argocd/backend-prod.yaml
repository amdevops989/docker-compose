apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/amdevops989/docker-compose.git'
    targetRevision: HEAD
    path: gitops/kustomize/environments/prod/backend
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # FIXED: Wrapped inside syncOptions array layer
    syncOptions:
      - CreateNamespace=true
